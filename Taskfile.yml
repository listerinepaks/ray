version: "3"

vars:
  VENV_BIN:
    sh: |
      if [ -n "${VIRTUAL_ENV:-}" ] && [ -x "${VIRTUAL_ENV}/bin/python" ]; then
        echo "${VIRTUAL_ENV}/bin"
      elif [ -x ".venv/bin/python" ]; then
        echo ".venv/bin"
      elif [ -x "venv/bin/python" ]; then
        echo "venv/bin"
      else
        echo ".venv/bin"
      fi

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  git:pull:
    desc: Pull latest changes for current branch
    cmds:
      - git pull --ff-only

  api:migrate:
    desc: Apply Django migrations
    cmds:
      - "{{.VENV_BIN}}/python manage.py migrate"

  api:makemigrations:
    desc: Create Django migrations
    cmds:
      - "{{.VENV_BIN}}/python manage.py makemigrations"

  api:collectstatic:
    desc: Collect static assets for production
    cmds:
      - "{{.VENV_BIN}}/python manage.py collectstatic --noinput"

  api:check-deploy:
    desc: Run Django deployment checks
    cmds:
      - "{{.VENV_BIN}}/python manage.py check --deploy"

  web:install:
    desc: Install web dependencies
    dir: ray-web
    cmds:
      - npm ci

  web:build:
    desc: Build web app for production
    dir: ray-web
    cmds:
      - npm run build

  verify:
    desc: Run core verification checks (api + web + mobile)
    cmds:
      - task api:check-deploy
      - task web:build
      - task mobile:typecheck

  deploy:upgrade:
    desc: Upgrade production app in /opt/ray (run on server)
    cmds:
      - cd /opt/ray && git pull
      - cd /opt/ray && set -a && source /opt/ray/.env && set +a && {{.VENV_BIN}}/pip install -e ".[prod]"
      - cd /opt/ray && set -a && source /opt/ray/.env && set +a && {{.VENV_BIN}}/python manage.py migrate
      - cd /opt/ray && set -a && source /opt/ray/.env && set +a && {{.VENV_BIN}}/python manage.py collectstatic --noinput
      - cd /opt/ray/ray-web && npm ci && npm run build
      - sudo supervisorctl restart ray
      - sudo nginx -t && sudo systemctl reload nginx
