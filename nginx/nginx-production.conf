# Ray — production nginx (deploy tree: /opt/ray)
# Site: https://ray.wright5.us
# TLS: point ssl_* to your certs (e.g. Certbot: /etc/letsencrypt/live/ray.wright5.us/)

# ACME HTTP-01 (Certbot webroot) — optional; adjust root if you use it
server {
    listen 80;
    listen [::]:80;
    server_name ray.wright5.us;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ray.wright5.us;

    # Replace with your certificate paths after issuance
    ssl_certificate /etc/letsencrypt/live/ray.wright5.us/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ray.wright5.us/privkey.pem;
    # ssl_trusted_certificate /etc/letsencrypt/live/ray.wright5.us/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 25M;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Django API + admin (Gunicorn unix socket)
    location /api/ {
        proxy_pass http://unix:/opt/ray/run/django.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location /admin/ {
        proxy_pass http://unix:/opt/ray/run/django.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # collectstatic output (admin CSS/JS, etc.)
    location /static/ {
        alias /opt/ray/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias /opt/ray/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Vite hashed assets (cache aggressively)
    location /assets/ {
        root /opt/ray/ray-web/dist;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # SPA shell + client routes
    location / {
        root /opt/ray/ray-web/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
